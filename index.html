<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burton Database Insights</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f0d;--card:#111916;--border:#1e2d26;
  --accent:#2d8f5c;--accent-lt:#47b87a;
  --text:#e8ede9;--text2:#7a8f82;--text3:#4a5f52;
  --danger:#c45d2c;--warn:#d4a843;--success:#2d8f5c;
  --blue:#3d7ea6;--purple:#7a4d8a;
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.header{background:linear-gradient(135deg,var(--card),#0d1f16);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.header h1 span{color:var(--accent-lt)}
.header-meta{color:var(--text3);font-size:11px}
.container{max-width:1400px;margin:0 auto;padding:0 28px 40px}
.tabs{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.tab{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--text3)}
.filters{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;align-items:center}
.filters select{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;font-size:12px;font-family:'JetBrains Mono',monospace}
.filters .clear{background:transparent;border:1px solid var(--danger);border-radius:8px;color:var(--danger);padding:6px 12px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.filters .count{color:var(--text3);font-size:11px}
.section-title{margin:36px 0 20px}
.section-title h2{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.section-title p{color:var(--text2);font-size:13px;margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;position:relative;overflow:hidden}
.kpi-icon{position:absolute;top:12px;right:16px;font-size:28px;opacity:.15}
.kpi-label{color:var(--text2);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-size:32px;font-weight:700;line-height:1}
.kpi-sub{color:var(--text3);font-size:12px;margin-top:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:800px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-title{color:var(--text2);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.chart-wrap{position:relative;width:100%;height:300px}
.chart-wrap.short{height:220px}
.chart-wrap.tall{height:400px}
.health-bar{margin-bottom:14px}
.health-bar .hb-head{display:flex;justify-content:space-between;margin-bottom:4px}
.health-bar .hb-label{color:var(--text2);font-size:12px}
.health-bar .hb-val{color:var(--text);font-size:12px;font-weight:600}
.health-bar .hb-track{background:#0d1410;border-radius:6px;height:8px;overflow:hidden}
.health-bar .hb-fill{height:100%;border-radius:6px;transition:width .8s ease}
.health-ring{display:inline-flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%}
.health-ring-inner{width:96px;height:96px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center}
.health-ring-score{font-size:32px;font-weight:700}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:8px}
.contact-item{background:#0d1410;border-radius:8px;padding:16px;text-align:center}
.contact-item .ci-icon{font-size:24px;margin-bottom:4px}
.contact-item .ci-val{color:var(--text);font-size:20px;font-weight:700}
.contact-item .ci-label{color:var(--text3);font-size:10px;margin-top:2px}
.contact-item .ci-pct{color:var(--text2);font-size:11px}
.upload-btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif}
.upload-btn input{display:none}
.report{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;line-height:1.8;font-size:14px;color:var(--text2)}
.report h3{color:var(--text);font-size:18px;font-weight:700;margin-top:0}
.report h4{color:var(--accent-lt);margin-top:24px}
.report strong{color:var(--text)}
.report .recs{background:#0d1410;border-radius:8px;padding:16px;margin-top:8px;display:flex;flex-direction:column;gap:10px;font-size:13px}
.upload-history{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.upload-row{display:flex;justify-content:space-between;padding:8px 12px;background:#0d1410;border-radius:6px;font-size:12px}
.hidden{display:none}
.landing{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.landing h1{font-size:28px;font-weight:700;margin-bottom:8px}
.landing p{color:var(--text2);margin-bottom:24px}
.landing .upload-btn{font-size:15px;padding:12px 32px;border-radius:10px}
</style>
</head>
<body>

<div id="landing" class="landing">
  <div>
    <div style="font-size:48px;margin-bottom:16px">🔧</div>
    <h1>Burton Database Insights</h1>
    <p>Upload your customer CSV to get started</p>
    <label class="upload-btn">
      Upload CSV
      <input type="file" accept=".csv" onchange="handleFile(this.files[0])">
    </label>
    <div id="landing-history" class="mono" style="margin-top:24px;color:var(--text3);font-size:12px"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <div>
      <h1><span>⬡</span> Burton Database Insights</h1>
      <div id="header-meta" class="header-meta mono"></div>
    </div>
    <label class="upload-btn">
      📤 Upload New
      <input type="file" accept=".csv" onchange="handleFile(this.files[0])">
    </label>
  </div>

  <div class="container">
    <div class="tabs" id="tabs"></div>
    <div class="filters" id="filters-bar"></div>

    <div id="tab-overview" class="tab-content"></div>
    <div id="tab-brands" class="tab-content hidden"></div>
    <div id="tab-retention" class="tab-content hidden"></div>
    <div id="tab-health" class="tab-content hidden"></div>
    <div id="tab-report" class="tab-content hidden"></div>
  </div>
</div>

<script>
// ── State ──
let DATA = [], FILTERED = [], STATS = null;
let brandFilter = "All", statusFilter = "All", activeTab = "overview";
let uploadTime = null, uploadHistory = [];
const charts = {};

// ── CSV Parser ──
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const hdr = lines[0].replace(/^\uFEFF/, "").split(",").map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const v = lines[i].split(",");
    const r = {};
    hdr.forEach((h, j) => r[h] = (v[j] || "").trim());
    rows.push(r);
  }
  return rows;
}

function parseDate(s) {
  if (!s) return null;
  const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  return m ? new Date(+m[3], +m[2]-1, +m[1]) : null;
}

function normMake(mk) {
  if (!mk) return "Unknown";
  const u = mk.toUpperCase();
  const map = {"SEAT":"SEAT","MG-ROVER":"MG Rover","MG":"MG","MERCEDES-BENZ":"Mercedes-Benz","BMW":"BMW","VOLKSWAGEN":"Volkswagen","LAND ROVER":"Land Rover","ALFA ROMEO":"Alfa Romeo","ASTON MARTIN":"Aston Martin","ROLLS ROYCE":"Rolls Royce"};
  return map[u] || mk.charAt(0).toUpperCase() + mk.slice(1).toLowerCase();
}

function normModel(md) {
  if (!md) return "Unknown";
  const u = md.toUpperCase();
  const map = {"TIGUAN":"Tiguan","UP":"Up","TOUREG":"Touareg","TOUAREG":"Touareg","GOLF 8":"Golf"};
  return map[u] || md.charAt(0).toUpperCase() + md.slice(1).toLowerCase();
}

function processData(rows) {
  const now = new Date();
  return rows.map(r => {
    const created = parseDate(r["Customer Created Date"]);
    const lastVisit = parseDate(r["Last Workshop Visit"]);
    const motExpiry = parseDate(r["MOT Expiry Date"]);
    const serviceDue = parseDate(r["Service Due Date"]);
    const make = normMake(r["Make"]);
    const model = normModel(r["Model"]);
    const days = lastVisit ? Math.floor((now - lastVisit) / 86400000) : null;
    let status = "Never Visited";
    if (lastVisit) { status = days <= 365 ? "Active" : days <= 730 ? "At Risk" : "Lapsed"; }
    const motStatus = !motExpiry ? "Unknown" : motExpiry < now ? "Expired" : motExpiry < new Date(now.getTime()+30*86400000) ? "Due Soon" : "Valid";
    const serviceStatus = !serviceDue ? "Unknown" : serviceDue < now ? "Overdue" : serviceDue < new Date(now.getTime()+30*86400000) ? "Due Soon" : "Upcoming";
    return { make, model, created, lastVisit, motExpiry, serviceDue, status, motStatus, serviceStatus,
      allowEmail: r["Allow Email"]==="TRUE", allowSMS: r["Allow SMS"]==="TRUE",
      mobileTPS: r["Mobile TPS"]==="TRUE", telTPS: r["Telephone TPS"]==="TRUE",
      motReminder: r["MOT Reminder"]==="TRUE", serviceReminder: r["Allow Service Reminder"]==="TRUE",
      customerType: r["Customer Type"] || "Unspecified", postCode: r["Post Code"] || "" };
  });
}

// ── Stats ──
function countBy(arr, key) {
  const m = {};
  arr.forEach(r => { const k = r[key] || "Unknown"; m[k] = (m[k]||0)+1; });
  return m;
}

function computeStats(data, allData) {
  const total = data.length;
  const byMake = countBy(data, "make");
  const topMakes = Object.entries(byMake).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const byModel = countBy(data, "model");
  const topModels = Object.entries(byModel).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const byStatus = countBy(data, "status");
  const byMotStatus = countBy(data, "motStatus");
  const byServiceStatus = countBy(data, "serviceStatus");
  const byType = countBy(data, "customerType");

  const contactable = {
    email: data.filter(r=>r.allowEmail).length,
    sms: data.filter(r=>r.allowSMS).length,
    either: data.filter(r=>r.allowEmail||r.allowSMS).length,
    neither: data.filter(r=>!r.allowEmail&&!r.allowSMS).length,
    motReminder: data.filter(r=>r.motReminder).length,
    serviceReminder: data.filter(r=>r.serviceReminder).length
  };

  // Monthly growth
  const mg = {};
  data.forEach(r => { if(r.created){ const k=r.created.getFullYear()+"-"+String(r.created.getMonth()+1).padStart(2,"0"); mg[k]=(mg[k]||0)+1; }});
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const growthData = Object.entries(mg).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,c])=>{
    const [y,mo]=m.split("-"); return {month:m, label:months[+mo-1]+" "+y.slice(2), count:c};
  });
  let cum=0; growthData.forEach(d=>{cum+=d.count;d.cumulative=cum;});

  // Visit trend
  const vm = {};
  data.forEach(r => { if(r.lastVisit){ const k=r.lastVisit.getFullYear()+"-"+String(r.lastVisit.getMonth()+1).padStart(2,"0"); vm[k]=(vm[k]||0)+1; }});
  const visitData = Object.entries(vm).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,c])=>{
    const [y,mo]=m.split("-"); return {month:m, label:months[+mo-1]+" "+y.slice(2), count:c};
  });

  // Retention by cohort
  const ry = {};
  data.forEach(r => { if(r.created){ const yr=r.created.getFullYear(); if(!ry[yr])ry[yr]={total:0,active:0,atRisk:0,lapsed:0}; ry[yr].total++; if(r.status==="Active")ry[yr].active++; if(r.status==="At Risk")ry[yr].atRisk++; if(r.status==="Lapsed")ry[yr].lapsed++; }});
  const retentionData = Object.entries(ry).sort((a,b)=>+a[0]-+b[0]).map(([yr,d])=>({year:yr,...d,retentionRate:Math.round(d.active/d.total*100)}));

  const activeRate = (byStatus["Active"]||0)/total;
  const contactRate = contactable.either/total;
  const motKnown = total-(byMotStatus["Unknown"]||0)||1;
  const motValidRate = (byMotStatus["Valid"]||0)/motKnown;
  const reminderRate = contactable.serviceReminder/total;
  const healthScore = Math.round((activeRate*35+contactRate*25+motValidRate*20+reminderRate*20)*100);

  const vwData = allData.filter(r=>r.make==="Volkswagen");
  const vwModels = countBy(vwData,"model");
  const topVWModels = Object.entries(vwModels).sort((a,b)=>b[1]-a[1]).slice(0,10);

  return { total, byMake, topMakes, byModel, topModels, byStatus, byMotStatus, byServiceStatus, byType,
    contactable, growthData, visitData, retentionData, healthScore, activeRate, contactRate, motValidRate,
    reminderRate, topVWModels, vwTotal:vwData.length };
}

// ── File Handler ──
async function handleFile(file) {
  if (!file) return;
  const text = await file.text();
  const rows = parseCSV(text);
  DATA = processData(rows);
  uploadTime = new Date().toISOString();
  uploadHistory.push({ date: uploadTime, records: DATA.length, filename: file.name });
  try { await window.storage.set("upload_history", JSON.stringify(uploadHistory)); } catch(e){}
  applyFilters();
  document.getElementById("landing").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  renderAll();
}

function applyFilters() {
  FILTERED = DATA.slice();
  if (brandFilter !== "All") FILTERED = FILTERED.filter(r => r.make === brandFilter);
  if (statusFilter !== "All") FILTERED = FILTERED.filter(r => r.status === statusFilter);
  STATS = computeStats(FILTERED, DATA);
}

// ── Rendering ──
function renderAll() {
  renderHeader();
  renderTabs();
  renderFilters();
  renderOverview();
  renderBrands();
  renderRetention();
  renderHealth();
  renderReport();
  showTab(activeTab);
}

function renderHeader() {
  const meta = [];
  if (uploadTime) meta.push("Last uploaded: " + new Date(uploadTime).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}));
  if (uploadHistory.length > 1) meta.push(uploadHistory.length + " uploads total");
  if (STATS) meta.push(STATS.total.toLocaleString() + " records");
  document.getElementById("header-meta").textContent = meta.join(" · ");
}

function renderTabs() {
  const tabs = [["overview","Overview"],["brands","Brand & Model Mix"],["retention","Retention & Trends"],["health","Database Health"],["report","MD Report"]];
  document.getElementById("tabs").innerHTML = tabs.map(([id,label])=>
    `<button class="tab ${activeTab===id?'active':''}" onclick="showTab('${id}')">${label}</button>`
  ).join("");
}

function showTab(id) {
  activeTab = id;
  document.querySelectorAll(".tab-content").forEach(el => el.classList.add("hidden"));
  document.getElementById("tab-"+id).classList.remove("hidden");
  document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(el => { if(el.textContent.toLowerCase().includes(id==="overview"?"overview":id==="brands"?"brand":id==="retention"?"retention":id==="health"?"health":"report")) el.classList.add("active"); });
  renderTabs();
  // Resize charts
  setTimeout(()=>{ Object.values(charts).forEach(c=>{ try{c.resize()}catch(e){} }); },100);
}

function renderFilters() {
  const topBrands = Object.entries(countBy(DATA,"make")).sort((a,b)=>b[1]-a[1]).slice(0,25).map(([m])=>m);
  let html = `<select onchange="brandFilter=this.value;applyFilters();renderAll()">
    <option value="All">All Brands</option>
    ${topBrands.map(b=>`<option value="${b}" ${brandFilter===b?'selected':''}>${b}</option>`).join("")}
  </select>
  <select onchange="statusFilter=this.value;applyFilters();renderAll()">
    <option value="All">All Statuses</option>
    ${["Active","At Risk","Lapsed","Never Visited"].map(s=>`<option value="${s}" ${statusFilter===s?'selected':''}>${s}</option>`).join("")}
  </select>`;
  if (brandFilter!=="All"||statusFilter!=="All") html += `<button class="clear" onclick="brandFilter='All';statusFilter='All';applyFilters();renderAll()">✕ Clear Filters</button>`;
  html += `<span class="count mono">Showing ${FILTERED.length.toLocaleString()} of ${DATA.length.toLocaleString()} records</span>`;
  document.getElementById("filters-bar").innerHTML = html;
}

function kpi(label, value, sub, color, icon) {
  return `<div class="kpi"><div class="kpi-icon">${icon}</div><div class="kpi-label mono">${label}</div><div class="kpi-value" style="color:${color||'var(--accent-lt)'}">${value}</div>${sub?`<div class="kpi-sub mono">${sub}</div>`:''}</div>`;
}

function destroyChart(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }

function makeChart(canvasId, config) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  Chart.defaults.color = '#7a8f82';
  Chart.defaults.borderColor = '#1e2d26';
  Chart.defaults.font.family = "'JetBrains Mono', monospace";
  Chart.defaults.font.size = 11;
  charts[canvasId] = new Chart(ctx, config);
}

// ── Tab Renderers ──
function renderOverview() {
  const S = STATS;
  if (!S) return;
  const pct = v => Math.round(v*100);
  let html = `
  <div class="section-title"><h2>Dashboard Overview</h2><p class="mono">Key performance indicators at a glance</p></div>
  <div class="kpi-grid">
    ${kpi("Total Customers",S.total.toLocaleString(),"","var(--accent-lt)","👥")}
    ${kpi("Active (12mo)",(S.byStatus["Active"]||0).toLocaleString(),pct(S.activeRate)+"% of database","var(--success)","✓")}
    ${kpi("At Risk (12-24mo)",(S.byStatus["At Risk"]||0).toLocaleString(),"","var(--warn)","⚠")}
    ${kpi("Lapsed (24mo+)",(S.byStatus["Lapsed"]||0).toLocaleString(),"","var(--danger)","✕")}
    ${kpi("Health Score",S.healthScore+"/100","Weighted composite",S.healthScore>=60?"var(--success)":S.healthScore>=40?"var(--warn)":"var(--danger)","♥")}
    ${kpi("Contactable",pct(S.contactRate)+"%",S.contactable.either.toLocaleString()+" by email or SMS","var(--accent-lt)","✉")}
  </div>
  <div class="grid-2">
    <div class="card"><div class="card-title mono">Customer Status Distribution</div><div class="chart-wrap short"><canvas id="ch-status"></canvas></div></div>
    <div class="card"><div class="card-title mono">Customer Type Split</div><div class="chart-wrap short"><canvas id="ch-type"></canvas></div></div>
  </div>
  <div class="grid-2">
    <div class="card"><div class="card-title mono">MOT Status</div><div class="chart-wrap short"><canvas id="ch-mot"></canvas></div></div>
    <div class="card"><div class="card-title mono">Service Status</div><div class="chart-wrap short"><canvas id="ch-service"></canvas></div></div>
  </div>`;
  document.getElementById("tab-overview").innerHTML = html;

  // Status donut
  const statusColors = {"Active":"#2d8f5c","At Risk":"#d4a843","Lapsed":"#c45d2c","Never Visited":"#4a5f52"};
  const statusEntries = Object.entries(S.byStatus);
  makeChart("ch-status",{type:"doughnut",data:{labels:statusEntries.map(e=>e[0]),datasets:[{data:statusEntries.map(e=>e[1]),backgroundColor:statusEntries.map(e=>statusColors[e[0]]||"#3d7ea6"),borderColor:"#0a0f0d",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}}}});

  // Type bar
  const typeEntries = Object.entries(S.byType).sort((a,b)=>b[1]-a[1]);
  makeChart("ch-type",{type:"bar",data:{labels:typeEntries.map(e=>e[0]),datasets:[{data:typeEntries.map(e=>e[1]),backgroundColor:"#2d8f5c",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});

  // MOT donut
  const motColors = {"Valid":"#2d8f5c","Due Soon":"#d4a843","Expired":"#c45d2c","Unknown":"#4a5f52"};
  const motEntries = Object.entries(S.byMotStatus);
  makeChart("ch-mot",{type:"doughnut",data:{labels:motEntries.map(e=>e[0]),datasets:[{data:motEntries.map(e=>e[1]),backgroundColor:motEntries.map(e=>motColors[e[0]]||"#3d7ea6"),borderColor:"#0a0f0d",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}}}});

  // Service donut
  const svcEntries = Object.entries(S.byServiceStatus);
  makeChart("ch-service",{type:"doughnut",data:{labels:svcEntries.map(e=>e[0]),datasets:[{data:svcEntries.map(e=>e[1]),backgroundColor:svcEntries.map(e=>motColors[e[0]]||"#3d7ea6"),borderColor:"#0a0f0d",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}}}});
}

function renderBrands() {
  const S = STATS;
  if (!S) return;
  const COLORS = ["#1a5f3a","#2d8f5c","#47b87a","#6fd49a","#a3e4be","#c45d2c","#e8834a","#f4a573","#1b4965","#3d7ea6","#5da2c9","#8bc4e0","#7a4d8a","#a374b5","#c49dd6"];
  let html = `
  <div class="section-title"><h2>Brand & Model Mix</h2><p class="mono">Brand and model distribution across your database</p></div>
  <div class="card"><div class="card-title mono">Top 15 Makes</div><div class="chart-wrap tall"><canvas id="ch-makes"></canvas></div></div>
  ${S.vwTotal>0?`<div class="card" style="margin-top:14px"><div class="card-title mono">Volkswagen Model Breakdown</div><div class="mono" style="color:var(--text3);font-size:11px;margin-bottom:12px">${S.vwTotal.toLocaleString()} VW vehicles · ${Math.round(S.vwTotal/DATA.length*100)}% of total database</div><div class="chart-wrap" style="height:340px"><canvas id="ch-vw"></canvas></div></div>`:''}
  <div class="card" style="margin-top:14px"><div class="card-title mono">Top 15 Models (All Brands)</div><div class="chart-wrap tall"><canvas id="ch-models"></canvas></div></div>`;
  document.getElementById("tab-brands").innerHTML = html;

  makeChart("ch-makes",{type:"bar",data:{labels:S.topMakes.map(e=>e[0]),datasets:[{data:S.topMakes.map(e=>e[1]),backgroundColor:S.topMakes.map((_,i)=>COLORS[i%COLORS.length]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});

  if (S.vwTotal > 0) {
    makeChart("ch-vw",{type:"bar",data:{labels:S.topVWModels.map(e=>e[0]),datasets:[{data:S.topVWModels.map(e=>e[1]),backgroundColor:S.topVWModels.map((_,i)=>COLORS[i%COLORS.length]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});
  }

  makeChart("ch-models",{type:"bar",data:{labels:S.topModels.map(e=>e[0]),datasets:[{data:S.topModels.map(e=>e[1]),backgroundColor:S.topModels.map((_,i)=>COLORS[i%COLORS.length]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"}},y:{grid:{display:false}}}}});
}

function renderRetention() {
  const S = STATS;
  if (!S) return;
  const skip = Math.max(1,Math.floor(S.growthData.length/14));
  let html = `
  <div class="section-title"><h2>Retention & Trends</h2><p class="mono">How your customer base has grown and how well you retain them</p></div>
  <div class="card"><div class="card-title mono">Database Growth Over Time (Cumulative)</div><div class="chart-wrap"><canvas id="ch-growth"></canvas></div></div>
  <div class="card" style="margin-top:14px"><div class="card-title mono">New Customers Per Month</div><div class="chart-wrap"><canvas id="ch-newcust"></canvas></div></div>
  <div class="card" style="margin-top:14px"><div class="card-title mono">Workshop Visits Per Month</div><div class="chart-wrap"><canvas id="ch-visits"></canvas></div></div>
  <div class="card" style="margin-top:14px"><div class="card-title mono">Retention by Customer Cohort Year</div><div class="chart-wrap"><canvas id="ch-cohort"></canvas></div></div>`;
  document.getElementById("tab-retention").innerHTML = html;

  makeChart("ch-growth",{type:"line",data:{labels:S.growthData.map(d=>d.label),datasets:[{data:S.growthData.map(d=>d.cumulative),borderColor:"#47b87a",backgroundColor:"rgba(45,143,92,0.15)",fill:true,tension:.3,pointRadius:0,borderWidth:2,label:"Total Customers"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"#1e2d26"},ticks:{maxTicksLimit:14}},y:{grid:{color:"#1e2d26"}}}}});

  makeChart("ch-newcust",{type:"bar",data:{labels:S.growthData.map(d=>d.label),datasets:[{data:S.growthData.map(d=>d.count),backgroundColor:"#2d8f5c",borderRadius:2,label:"New Customers"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:14}},y:{grid:{color:"#1e2d26"}}}}});

  makeChart("ch-visits",{type:"bar",data:{labels:S.visitData.map(d=>d.label),datasets:[{data:S.visitData.map(d=>d.count),backgroundColor:"#3d7ea6",borderRadius:2,label:"Visits"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:14}},y:{grid:{color:"#1e2d26"}}}}});

  // Stacked cohort bar + line
  makeChart("ch-cohort",{type:"bar",data:{labels:S.retentionData.map(d=>d.year),datasets:[
    {data:S.retentionData.map(d=>d.active),backgroundColor:"#2d8f5c",label:"Active",stack:"a"},
    {data:S.retentionData.map(d=>d.atRisk),backgroundColor:"#d4a843",label:"At Risk",stack:"a"},
    {data:S.retentionData.map(d=>d.lapsed),backgroundColor:"#c45d2c",label:"Lapsed",stack:"a"},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{padding:12,usePointStyle:true,pointStyleWidth:8}}},scales:{x:{grid:{display:false},stacked:true},y:{grid:{color:"#1e2d26"},stacked:true}}}});
}

function renderHealth() {
  const S = STATS;
  if (!S) return;
  const sc = S.healthScore;
  const scColor = sc>=60?"var(--success)":sc>=40?"var(--warn)":"var(--danger)";
  function hbar(label,val,max,color,fmt) {
    const pct = Math.min(val/max*100,100);
    return `<div class="health-bar"><div class="hb-head"><span class="hb-label mono">${label}</span><span class="hb-val mono">${fmt}</span></div><div class="hb-track"><div class="hb-fill" style="width:${pct}%;background:linear-gradient(90deg,${color},${color}aa)"></div></div></div>`;
  }

  let historyHtml = '';
  if (uploadHistory.length > 0) {
    historyHtml = `<div class="card" style="margin-top:14px"><div class="card-title mono">Upload History</div><div class="upload-history">${
      uploadHistory.slice().reverse().map(u => `<div class="upload-row mono"><span style="color:var(--text2)">${new Date(u.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</span><span style="color:var(--text3)">${u.filename}</span><span style="color:var(--accent-lt)">${u.records.toLocaleString()} records</span></div>`).join("")
    }</div></div>`;
  }

  document.getElementById("tab-health").innerHTML = `
  <div class="section-title"><h2>Database Health</h2><p class="mono">How healthy and usable is your customer database?</p></div>
  <div class="grid-2">
    <div class="card" style="text-align:center;padding:24px">
      <div class="card-title mono" style="text-align:left">Overall Health Score</div>
      <div style="margin:24px 0">
        <div class="health-ring" style="background:conic-gradient(${scColor} ${sc*3.6}deg, var(--border) 0deg)">
          <div class="health-ring-inner"><span class="health-ring-score" style="color:${scColor}">${sc}</span></div>
        </div>
      </div>
      <div class="mono" style="color:var(--text3);font-size:12px;line-height:1.6;text-align:left">Weighted: Active rate (35%) + Contactability (25%) + MOT validity (20%) + Reminder opt-in (20%)</div>
    </div>
    <div class="card" style="padding:24px">
      <div class="card-title mono">Health Components</div>
      <div style="margin-top:12px">
        ${hbar("Active Customers (visited in 12mo)",S.byStatus["Active"]||0,S.total,"#2d8f5c",Math.round(S.activeRate*100)+"%")}
        ${hbar("Contactable (email or SMS)",S.contactable.either,S.total,"#3d7ea6",Math.round(S.contactRate*100)+"%")}
        ${hbar("MOT Valid",S.byMotStatus["Valid"]||0,S.total-(S.byMotStatus["Unknown"]||0),"#d4a843",Math.round(S.motValidRate*100)+"%")}
        ${hbar("Service Reminder Opted In",S.contactable.serviceReminder,S.total,"#7a4d8a",Math.round(S.contactable.serviceReminder/S.total*100)+"%")}
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:14px;padding:24px">
    <div class="card-title mono">Contactability Breakdown</div>
    <div class="contact-grid">
      ${[["Allow Email",S.contactable.email,"✉"],["Allow SMS",S.contactable.sms,"💬"],["Either Channel",S.contactable.either,"📡"],["Unreachable",S.contactable.neither,"🚫"],["MOT Reminder On",S.contactable.motReminder,"🔔"],["Service Reminder On",S.contactable.serviceReminder,"🔧"]].map(([l,v,ic])=>
        `<div class="contact-item"><div class="ci-icon">${ic}</div><div class="ci-val">${v.toLocaleString()}</div><div class="ci-label mono">${l}</div><div class="ci-pct mono">${Math.round(v/S.total*100)}%</div></div>`
      ).join("")}
    </div>
  </div>
  ${historyHtml}`;
}

function renderReport() {
  const S = STATS;
  if (!S) return;
  const vwCount = DATA.filter(r=>r.make==="Volkswagen").length;
  const vwPct = Math.round(vwCount/DATA.length*100);
  document.getElementById("tab-report").innerHTML = `
  <div class="section-title"><h2>MD Report</h2><p class="mono">Executive summary for Managing Director review</p></div>
  <div class="report">
    <h3>📊 Burton Database — Executive Summary</h3>
    <p class="mono" style="color:var(--text3);font-size:11px">Generated: ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})} · Data: ${S.total.toLocaleString()} customer records</p>

    <h4>1. Database Size & Health</h4>
    <p>Your database contains <strong>${S.total.toLocaleString()}</strong> customer records with an overall health score of <strong style="color:${S.healthScore>=60?'var(--success)':'var(--warn)'}">${S.healthScore}/100</strong>. Of these, <strong>${(S.byStatus["Active"]||0).toLocaleString()}</strong> (${Math.round(S.activeRate*100)}%) are active customers who have visited within the last 12 months.</p>
    <p><strong style="color:var(--warn)">${(S.byStatus["At Risk"]||0).toLocaleString()}</strong> customers are at risk of lapsing (12-24 months since last visit) and <strong style="color:var(--danger)">${(S.byStatus["Lapsed"]||0).toLocaleString()}</strong> have lapsed (24+ months). There are also <strong>${(S.byStatus["Never Visited"]||0).toLocaleString()}</strong> records with no workshop visit recorded.</p>

    <h4>2. Brand Concentration</h4>
    <p>Volkswagen dominates your database at <strong>${vwCount.toLocaleString()}</strong> vehicles (${vwPct}% of total). This is both a strength (specialisation) and a risk (dependency on one franchise). The top 5 VW models are Golf, Polo, Passat, Tiguan, and T-Roc.</p>
    <p>Other notable brands: Hyundai (${(S.byMake["Hyundai"]||0).toLocaleString()}), Audi (${(S.byMake["Audi"]||0).toLocaleString()}), Ford (${(S.byMake["Ford"]||0).toLocaleString()}), and Skoda (${(S.byMake["Skoda"]||0).toLocaleString()}).</p>

    <h4>3. Contactability & Marketing</h4>
    <p>Contactability is strong: <strong style="color:var(--success)">${Math.round(S.contactRate*100)}%</strong> of customers can be reached by email or SMS. However, <strong style="color:var(--danger)">${S.contactable.neither.toLocaleString()}</strong> customers (${Math.round(S.contactable.neither/S.total*100)}%) are completely unreachable — these are dead records for marketing purposes.</p>
    <p>MOT reminders are enabled for <strong>${S.contactable.motReminder.toLocaleString()}</strong> customers and service reminders for <strong>${S.contactable.serviceReminder.toLocaleString()}</strong>. These are your key automated revenue drivers.</p>

    <h4>4. MOT & Service Opportunity</h4>
    <p>A large number of MOTs have expired (<strong style="color:var(--danger)">${(S.byMotStatus["Expired"]||0).toLocaleString()}</strong>) and services are overdue (<strong style="color:var(--danger)">${(S.byServiceStatus["Overdue"]||0).toLocaleString()}</strong>). Filtering for active + contactable + overdue customers represents your most immediate revenue recovery opportunity.</p>
    <p>There are <strong style="color:var(--warn)">${(S.byMotStatus["Due Soon"]||0).toLocaleString()}</strong> MOTs due within 30 days — these should be priority outbound contacts.</p>

    <h4>5. Key Recommendations</h4>
    <div class="recs">
      <div><span style="color:var(--danger);font-weight:700">⚡ URGENT:</span> Run a targeted campaign to the ${(S.byStatus["At Risk"]||0).toLocaleString()} at-risk customers before they lapse — a service or MOT offer could recover significant revenue.</div>
      <div><span style="color:var(--warn);font-weight:700">📋 DATA QUALITY:</span> Clean duplicate brand entries (e.g. SEAT/Seat, Tiguan/TIGUAN, Toureg/Touareg) and populate missing Customer Type fields (${(S.byType["Unspecified"]||0).toLocaleString()} records).</div>
      <div><span style="color:var(--success);font-weight:700">📈 GROWTH:</span> VW dependency at ${vwPct}% is high. Consider targeted acquisition of other VAG brands (Audi, Skoda, SEAT) and independents to diversify.</div>
      <div><span style="color:var(--blue);font-weight:700">📡 CONTACT:</span> Ensure automated MOT and service reminders are firing for all ${S.contactable.either.toLocaleString()} contactable customers. The ${(S.byMotStatus["Due Soon"]||0).toLocaleString()} MOTs due in 30 days need immediate outreach.</div>
      <div><span style="color:var(--purple);font-weight:700">🗑️ CLEANSE:</span> Consider archiving the ${(S.byStatus["Lapsed"]||0).toLocaleString()} lapsed customers with no engagement in 2+ years to improve database accuracy and reporting.</div>
    </div>

    <h4>6. Customer Type Mix</h4>
    <p>Of classified customers: Private (${(S.byType["Private"]||0).toLocaleString()}), Trade (${(S.byType["Trade"]||0).toLocaleString()}), Corporate/Fleet (${(S.byType["Corporate/Fleet"]||0).toLocaleString()}), Business (${(S.byType["Business"]||0).toLocaleString()}), Motability (${(S.byType["Motability"]||0).toLocaleString()}). Note that ${(S.byType["Unspecified"]||0).toLocaleString()} records (${Math.round((S.byType["Unspecified"]||0)/S.total*100)}%) have no customer type — improving this data would enable better segmentation and targeted marketing.</p>
  </div>`;
}

// ── Init ──
(async () => {
  try {
    const stored = await window.storage.get("upload_history");
    if (stored) uploadHistory = JSON.parse(stored.value);
  } catch(e){}
  const lh = document.getElementById("landing-history");
  if (uploadHistory.length > 0 && lh) {
    const last = uploadHistory[uploadHistory.length-1];
    lh.textContent = "Last upload: " + new Date(last.date).toLocaleDateString("en-GB") + " (" + last.records.toLocaleString() + " records)";
  }
})();
</script>
</body>
</html>
